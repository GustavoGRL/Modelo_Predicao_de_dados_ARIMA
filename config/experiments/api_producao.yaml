# Experimento de exemplo para consumo via API.
data_source:
  type: "api"

api_data:
  url: "https://api.exemplo.com/dados"
  method: "GET"
  timeout_seconds: 30
  response_format: "csv"
  delimiter: ","
  token_env: "API_TOKEN"
  auth_header_name: "Authorization"
  auth_use_bearer: true

training:
  n_runs: 200
  n_threads: 4
  runs_per_round: 4
  top_k: 30
